services:
  # The Node.js Backend Server
  - type: web
    name: nextstep-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: nextstep-db
          property: connectionString

  # The PostgreSQL Database
  - type: pgo
    name: nextstep-db
    plan: free
    postgresMajorVersion: 15
